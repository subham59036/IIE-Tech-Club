<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0a0a0f" stroke="#6366f1" stroke-width="2"/>
  <!-- Hexagon shape representing tech/circuit -->
  <polygon
    points="32,10 50,21 50,43 32,54 14,43 14,21"
    fill="none"
    stroke="#6366f1"
    stroke-width="2"
    stroke-linejoin="round"
  />
  <!-- Inner T for TechOS -->
  <text
    x="32"
    y="38"
    font-family="Inter, system-ui, sans-serif"
    font-size="20"
    font-weight="700"
    fill="#6366f1"
    text-anchor="middle"
    dominant-baseline="middle"
  >T</text>
  <!-- Dot accents -->
  <circle cx="32" cy="10" r="2.5" fill="#22d3ee"/>
  <circle cx="50" cy="21" r="2.5" fill="#22d3ee"/>
  <circle cx="50" cy="43" r="2.5" fill="#22d3ee"/>
  <circle cx="32" cy="54" r="2.5" fill="#22d3ee"/>
  <circle cx="14" cy="43" r="2.5" fill="#22d3ee"/>
  <circle cx="14" cy="21" r="2.5" fill="#22d3ee"/>
</svg>
